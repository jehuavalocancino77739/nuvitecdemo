name: Publicar demo en GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: frontend
        run: npm ci

      - name: Compilar Angular
        working-directory: frontend
        run: npx ng build --base-href "/${{ github.event.repository.name }}/"

      - name: Preparar rutas de Angular
        run: cp frontend/dist/frontend/browser/index.html frontend/dist/frontend/browser/404.html

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Empaquetar sitio
        uses: actions/upload-pages-artifact@v4
        with:
          path: frontend/dist/frontend/browser

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publicar sitio
        id: deployment
        uses: actions/deploy-pages@v4
