spring.application.name=nuvitec-pe-api
server.port=8080
spring.config.import=optional:classpath:application-local.properties

spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost\\SQLEXPRESS;databaseName=NuvitecPeDb;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:120}

openai.api-key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-4o-mini}
openai.responses-url=${OPENAI_RESPONSES_URL:https://api.openai.com/v1/responses}

app.notifications.enabled=${NUVITEC_NOTIFICATIONS_ENABLED:false}
app.notifications.to=${NUVITEC_NOTIFICATIONS_TO:}
app.notifications.from=${NUVITEC_NOTIFICATIONS_FROM:no-reply@nuvitec.pe}

spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:true}
