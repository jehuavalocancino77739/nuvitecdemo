spring.application.name=nuvitec-pe-api
server.port=8080
spring.config.import=optional:classpath:application-local.properties

spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost\\SQLEXPRESS;databaseName=NuvitecPeDb;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:120}

openai.api-key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-4o-mini}
openai.responses-url=${OPENAI_RESPONSES_URL:https://api.openai.com/v1/responses}
